site_name: Meu Mundo da Veterinária
site_description: Meu Mundo da Veterinária
site_url: https://eduardocanda.github.io/Nielle-Second-Brain/
repo_url: https://github.com/EduardoCanda/Nielle-Second-Brain
repo_name: nielle-second-brain
edit_uri: edit/main/docs/

theme:
  favicon: assets/favicon.png
  font:
    text: Google Sans
  name: material
  features:
    - content.action.edit
  palette:
  - media: '(prefers-color-scheme: light)'
    primary: purple
    scheme: default
    accent: cyan
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    primary: purple
    scheme: slate
    accent: cyan
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  language: pt-BR
  color_mode: dark
  user_color_mode_toggle: true

plugins:
  - search
  - awesome-pages
  - redirects
  - gh-admonitions

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

# Usa o próprio repositório como fonte do site.
docs_dir: docs

# Evita publicar pastas/arquivos internos no site.
exclude_docs: |
  .git/
  .github/
  .obsidian/
  site/
  venv/
  .venv/
  **.txt
